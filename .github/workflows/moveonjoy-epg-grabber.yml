name: moveonjoy-epg-grabber

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  epg-grabber:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run epg grabber
        run: |
          cd moveonjoy
          python moveonjoy-epg-grabber.py

      - name: Create timestamp
        id: timestamp
        run: echo "ts=$(date -u +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Upload EPG to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest EPG
          body: "Auto-updated EPG build: ${{ steps.timestamp.outputs.ts }}"
          files: |
            epgs/moveonjoy-epg.xml
            epgs/moveonjoy-epg.xml.gz
          fail_on_unmatched_files: true
